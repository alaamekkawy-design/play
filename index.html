<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mekkawy m3u Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        /* نفس الستايلات السابقة */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            width: 95%;
            max-width: 900px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 28px;
            background: linear-gradient(90deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .player-wrapper {
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        video { width: 100%; display: block; max-height: 500px; background: #000; }
        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            margin: 15px 0;
        }
        .channel-list {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .channel-list::-webkit-scrollbar { width: 8px; }
        .channel-list::-webkit-scrollbar-thumb { background: #f7971e; border-radius: 10px; }
        .channel-item {
            padding: 10px 15px;
            margin: 5px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid transparent;
        }
        .channel-item:hover {
            background: rgba(247, 151, 30, 0.2);
            border-left-color: #f7971e;
            transform: translateX(5px);
        }
        .channel-item.active {
            background: rgba(247, 151, 30, 0.3);
            border-left-color: #ffd200;
        }
        .channel-name { font-weight: 500; }
        .channel-number {
            color: #aaa;
            font-size: 12px;
            background: rgba(255,255,255,0.1);
            padding: 2px 10px;
            border-radius: 20px;
        }
        button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            border: none;
            border-radius: 10px;
            color: #1a1a2e;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(247, 151, 30, 0.4); }
        button.secondary {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        button.secondary:hover { background: rgba(255,255,255,0.2); }
        #status {
            text-align: center;
            padding: 10px;
            color: #ffd200;
            font-size: 14px;
            min-height: 40px;
        }
        .info { text-align: center; color: #888; font-size: 13px; margin-top: 10px; }
        .badge {
            display: inline-block;
            background: rgba(247, 151, 30, 0.2);
            padding: 2px 12px;
            border-radius: 20px;
            color: #ffd200;
            font-size: 12px;
        }
        .warning {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff6b6b;
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            color: #ff6b6b;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📺 مشغل M3U</h1>
        
        <div class="warning" id="warningBox">
            ⚠️ بعض القنوات قد لا تعمل بسبب قيود CORS
        </div>
        
        <div class="player-wrapper">
            <video id="videoPlayer" controls></video>
        </div>

        <div class="controls">
            <button onclick="loadLocalM3U()">📂 تحميل القائمة</button>
            <button class="secondary" onclick="playNext()">⏭ التالي</button>
            <button class="secondary" onclick="playPrevious()">⏮ السابق</button>
            <button class="secondary" onclick="toggleProxy()">🔄 Proxy: <span id="proxyStatus">تشغيل</span></button>
            <span class="badge" id="channelCounter">0 قناة</span>
        </div>

        <div id="status">📁 جاري تحميل list.m3u...</div>

        <div class="channel-list" id="channelList">
            <div style="text-align:center;color:#888;padding:20px;">⏳ انتظر تحميل القائمة...</div>
        </div>
        
        <div class="info">
            💡 Mekkawy<strong>list.m3u</strong> 
        </div>
    </div>

    <script>
        let channels = [];
        let currentIndex = 0;
        let useProxy = true;
        const video = document.getElementById('videoPlayer');
        const statusDiv = document.getElementById('status');
        const channelListDiv = document.getElementById('channelList');
        const channelCounter = document.getElementById('channelCounter');
        const proxyStatus = document.getElementById('proxyStatus');

        // Proxy services (جرب أي واحد منهم)
        const PROXY_SERVICES = [
            'https://corsproxy.io/?',
            'https://api.allorigins.win/raw?url=',
            'https://thingproxy.freeboard.io/fetch/'
        ];

        function toggleProxy() {
            useProxy = !useProxy;
            proxyStatus.textContent = useProxy ? 'تشغيل' : 'إيقاف';
            // إعادة تحميل القناة الحالية
            if (channels.length > 0) {
                playChannel(currentIndex);
            }
        }

        function getProxiedUrl(url) {
            if (!useProxy) return url;
            // تحويل HTTP إلى HTTPS إذا لزم الأمر
            if (url.startsWith('http://')) {
                url = url.replace('http://', 'https://');
            }
            // استخدام أول Proxy
            return PROXY_SERVICES[0] + encodeURIComponent(url);
        }

        async function loadLocalM3U() {
            try {
                statusDiv.textContent = '🔄 جاري قراءة ملف list.m3u...';
                const response = await fetch('list.m3u');
                if (!response.ok) {
                    throw new Error('ملف list.m3u غير موجود!');
                }
                const text = await response.text();
                parseM3U(text);
            } catch (error) {
                statusDiv.textContent = '❌ ' + error.message;
                channelListDiv.innerHTML = `
                    <div style="text-align:center;color:#ff6b6b;padding:20px;">
                        ❌ ${error.message}<br>
                        <small style="color:#888;">ضع ملف list.m3u في نفس مجلد الصفحة</small>
                    </div>
                `;
            }
        }

        function parseM3U(data) {
            const lines = data.split('\n');
            channels = [];
            let currentChannel = { name: '', url: '' };

            for (let line of lines) {
                line = line.trim();
                if (line.startsWith('#EXTINF:')) {
                    const nameMatch = line.match(/,([^,]+)$/);
                    if (nameMatch) {
                        currentChannel.name = nameMatch[1].trim();
                    }
                } else if (line && !line.startsWith('#')) {
                    currentChannel.url = line;
                    if (currentChannel.name && currentChannel.url) {
                        channels.push({ ...currentChannel });
                        currentChannel = { name: '', url: '' };
                    }
                }
            }

            if (channels.length === 0) {
                statusDiv.textContent = '⚠️ لم يتم العثور على قنوات';
                channelListDiv.innerHTML = `
                    <div style="text-align:center;color:#ffd200;padding:20px;">
                        ⚠️ لا توجد قنوات في ملف list.m3u
                    </div>
                `;
                return;
            }

            statusDiv.textContent = `✅ تم تحميل ${channels.length} قناة`;
            channelCounter.textContent = `${channels.length} قناة`;
            displayChannels();
            
            if (channels.length > 0) {
                currentIndex = 0;
                playChannel(currentIndex);
            }
        }

        function displayChannels() {
            channelListDiv.innerHTML = '';
            channels.forEach((channel, index) => {
                const div = document.createElement('div');
                div.className = 'channel-item' + (index === currentIndex ? ' active' : '');
                div.innerHTML = `
                    <span class="channel-name">${channel.name}</span>
                    <span class="channel-number">#${index + 1}</span>
                `;
                div.onclick = () => {
                    currentIndex = index;
                    playChannel(index);
                };
                channelListDiv.appendChild(div);
            });
        }

        function playChannel(index) {
            if (index < 0 || index >= channels.length) return;
            
            const channel = channels[index];
            statusDiv.textContent = `▶️ تشغيل: ${channel.name}`;
            
            document.querySelectorAll('.channel-item').forEach((el, i) => {
                el.classList.toggle('active', i === index);
            });

            let url = channel.url;
            
            // إذا كان الرابط HTTP والصفحة HTTPS، نحوله لـ HTTPS
            if (window.location.protocol === 'https:' && url.startsWith('http://')) {
                url = url.replace('http://', 'https://');
            }

            // استخدام Proxy إذا كان مفعّل
            if (useProxy) {
                url = getProxiedUrl(url);
            }

            // إلغاء أي HLS سابق
            if (window.hlsInstance) {
                window.hlsInstance.destroy();
                window.hlsInstance = null;
            }

            if (Hls.isSupported()) {
                const hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                });
                window.hlsInstance = hls;
                
                hls.loadSource(url);
                hls.attachMedia(video);
                
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(e => {
                        statusDiv.textContent = `⚠️ ${channel.name}: اضغط زر التشغيل`;
                    });
                });
                
                hls.on(Hls.Events.ERROR, (e, data) => {
                    if (data.fatal) {
                        statusDiv.textContent = `❌ فشل تشغيل ${channel.name}`;
                        // محاولة بدون Proxy
                        if (useProxy) {
                            statusDiv.textContent = `🔄 محاولة بدون Proxy...`;
                            useProxy = false;
                            proxyStatus.textContent = 'إيقاف';
                            playChannel(index);
                        }
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play();
            } else {
                statusDiv.textContent = '❌ متصفحك لا يدعم تشغيل M3U';
            }
        }

        function playNext() {
            if (channels.length === 0) return;
            currentIndex = (currentIndex + 1) % channels.length;
            playChannel(currentIndex);
        }

        function playPrevious() {
            if (channels.length === 0) return;
            currentIndex = (currentIndex - 1 + channels.length) % channels.length;
            playChannel(currentIndex);
        }

        window.onload = function() {
            loadLocalM3U();
        };

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                playNext();
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                playPrevious();
            }
        });
    </script>
</body>
</html>

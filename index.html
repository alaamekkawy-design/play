<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشغل M3U / M3U8</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            width: 95%;
            max-width: 900px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 28px;
            background: linear-gradient(90deg, #f7971e, #ffd200);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .player-wrapper {
            position: relative;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        video {
            width: 100%;
            display: block;
            max-height: 500px;
            background: #000;
        }
        .url-input-area {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        .url-input-area input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 14px;
            min-width: 200px;
            transition: 0.3s;
        }
        .url-input-area input:focus {
            outline: none;
            border-color: #f7971e;
            background: rgba(255,255,255,0.1);
        }
        .url-input-area input::placeholder {
            color: #888;
        }
        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            margin: 15px 0;
        }
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 5px;
        }
        .tab {
            flex: 1;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: #888;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            font-size: 14px;
        }
        .tab.active {
            background: linear-gradient(135deg, #f7971e, #ffd200);
            color: #1a1a2e;
        }
        .tab:hover:not(.active) {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .search-area {
            display: flex;
            gap: 10px;
            margin: 10px 0;
            flex-wrap: wrap;
            align-items: center;
        }
        .search-area input {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 14px;
            min-width: 150px;
            transition: 0.3s;
        }
        .search-area input:focus {
            outline: none;
            border-color: #f7971e;
            background: rgba(255,255,255,0.1);
        }
        .search-area input::placeholder {
            color: #888;
        }
        .search-area .search-count {
            color: #aaa;
            font-size: 13px;
            padding: 5px 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            white-space: nowrap;
        }
        .channel-list {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            max-height: 300px;
            overflow-y: auto;
            margin-top: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            display: none;
        }
        .channel-list.active {
            display: block;
        }
        .channel-list::-webkit-scrollbar {
            width: 8px;
        }
        .channel-list::-webkit-scrollbar-thumb {
            background: #f7971e;
            border-radius: 10px;
        }
        .channel-item {
            padding: 10px 15px;
            margin: 5px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid transparent;
        }
        .channel-item:hover {
            background: rgba(247, 151, 30, 0.2);
            border-left-color: #f7971e;
            transform: translateX(5px);
        }
        .channel-item.active {
            background: rgba(247, 151, 30, 0.3);
            border-left-color: #ffd200;
        }
        .channel-item.highlight {
            background: rgba(247, 151, 30, 0.15);
            border-left-color: #f7971e;
        }
        .channel-name {
            font-weight: 500;
        }
        .channel-name .match {
            color: #ffd200;
            font-weight: bold;
            background: rgba(247, 151, 30, 0.2);
            padding: 0 4px;
            border-radius: 3px;
        }
        .channel-number {
            color: #aaa;
            font-size: 12px;
            background: rgba(255,255,255,0.1);
            padding: 2px 10px;
            border-radius: 20px;
        }
        button {
            padding: 12px 25px;
            background: linear-gradient(135deg, #f7971e, #ffd200);
            border: none;
            border-radius: 10px;
            color: #1a1a2e;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(247, 151, 30, 0.4);
        }
        button.secondary {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        button.secondary:hover {
            background: rgba(255,255,255,0.2);
        }
        button.small {
            padding: 8px 15px;
            font-size: 13px;
        }
        button.success {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
        }
        button.success:hover {
            box-shadow: 0 5px 20px rgba(46, 204, 113, 0.4);
        }
        button.danger {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }
        button.danger:hover {
            box-shadow: 0 5px 20px rgba(231, 76, 60, 0.4);
        }
        #status {
            text-align: center;
            padding: 10px;
            color: #ffd200;
            font-size: 14px;
            min-height: 40px;
        }
        .info {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-top: 10px;
        }
        .badge {
            display: inline-block;
            background: rgba(247, 151, 30, 0.2);
            padding: 2px 12px;
            border-radius: 20px;
            color: #ffd200;
            font-size: 12px;
        }
        .hidden {
            display: none;
        }
        .file-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 15px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
            margin: 5px 0;
            font-size: 13px;
            color: #aaa;
            flex-wrap: wrap;
            gap: 5px;
        }
        .file-info .filename {
            color: #ffd200;
            font-weight: bold;
        }
        .file-info .timestamp {
            color: #888;
            font-size: 11px;
        }
        .last-channel {
            background: rgba(46, 204, 113, 0.1);
            border: 1px solid rgba(46, 204, 113, 0.3);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #2ecc71;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .no-results {
            text-align: center;
            color: #888;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📺 مشغل M3U / M3U8</h1>
        
        <!-- Tabs للتبديل بين المصادر -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('file')" id="tabFile">📁 ملف M3U</button>
            <button class="tab" onclick="switchTab('url')" id="tabUrl">🔗 رابط M3U8</button>
        </div>

        <!-- قسم ملف M3U -->
        <div id="fileSection">
            <div class="file-info">
                <span>📄 الملف: <span class="filename" id="fileName">list.m3u</span></span>
                <span>
                    <span class="timestamp" id="fileTimestamp">⏱ لم يتم التحميل</span>
                    <span class="last-channel" id="lastChannelDisplay">💾 آخر قناة: لا يوجد</span>
                </span>
            </div>
            
            <!-- شريط البحث -->
            <div class="search-area">
                <input type="text" id="searchInput" placeholder="🔍 ابحث عن قناة... (اكتب أول حروف الاسم)" oninput="searchChannels(this.value)">
                <span class="search-count" id="searchCount">0 قناة</span>
                <button class="small secondary" onclick="clearSearch()">✖ إلغاء</button>
            </div>

            <div class="controls">
                <button class="success" onclick="loadLocalM3U()">🔄 تحديث القائمة</button>
                <button class="secondary" onclick="playNext()">⏭ التالي</button>
                <button class="secondary" onclick="playPrevious()">⏮ السابق</button>
                <span class="badge" id="channelCounter">0 قناة</span>
            </div>
        </div>

        <!-- قسم رابط M3U8 -->
        <div id="urlSection" class="hidden">
            <div class="url-input-area">
                <input type="text" id="m3u8Url" placeholder="الصق رابط M3U8 هنا (مثل: https://example.com/stream.m3u8)">
                <button onclick="playM3U8Url()" class="small">▶️ تشغيل</button>
            </div>
            <div style="text-align:center;color:#888;font-size:13px;margin:5px 0;">
                💡 أدخل رابط M3U8 مباشر وسيتم تشغيله فوراً
            </div>
        </div>

        <div class="player-wrapper">
            <video id="videoPlayer" controls></video>
        </div>

        <div id="status">📁 جاري تحميل list.m3u...</div>

        <!-- قائمة القنوات -->
        <div class="channel-list active" id="channelList">
            <div style="text-align:center;color:#888;padding:20px;">
                ⏳ انتظر تحميل القائمة...
            </div>
        </div>
        
        <div class="info">
            💡 ضع ملف <strong>list.m3u</strong> في نفس المجلد | ابحث بالحروف الأولى | يحفظ آخر قناة تلقائياً
        </div>
    </div>

    <script>
        let channels = [];
        let filteredChannels = [];
        let currentIndex = 0;
        let currentMode = 'file';
        let lastLoadTime = null;
        let searchQuery = '';
        let lastChannelName = '';
        
        const video = document.getElementById('videoPlayer');
        const statusDiv = document.getElementById('status');
        const channelListDiv = document.getElementById('channelList');
        const channelCounter = document.getElementById('channelCounter');
        const fileTimestamp = document.getElementById('fileTimestamp');
        const searchInput = document.getElementById('searchInput');
        const searchCount = document.getElementById('searchCount');
        const lastChannelDisplay = document.getElementById('lastChannelDisplay');
        let hlsInstance = null;

        // ============ حفظ واسترجاع آخر قناة ============
        function saveLastChannel(channelName, channelIndex) {
            try {
                localStorage.setItem('lastChannelName', channelName);
                localStorage.setItem('lastChannelIndex', channelIndex.toString());
                lastChannelDisplay.textContent = `💾 آخر قناة: ${channelName}`;
            } catch (e) {
                // تجاهل أخطاء localStorage
            }
        }

        function getLastChannel() {
            try {
                const name = localStorage.getItem('lastChannelName');
                const index = parseInt(localStorage.getItem('lastChannelIndex'));
                if (name && !isNaN(index)) {
                    return { name, index };
                }
            } catch (e) {
                // تجاهل
            }
            return null;
        }

        // ============ التبديل بين التبويبات ============
        function switchTab(mode) {
            currentMode = mode;
            
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            if (mode === 'file') {
                document.getElementById('tabFile').classList.add('active');
                document.getElementById('fileSection').classList.remove('hidden');
                document.getElementById('urlSection').classList.add('hidden');
                channelListDiv.classList.add('active');
                if (channels.length === 0) {
                    loadLocalM3U();
                } else {
                    displayChannels();
                }
            } else {
                document.getElementById('tabUrl').classList.add('active');
                document.getElementById('fileSection').classList.add('hidden');
                document.getElementById('urlSection').classList.remove('hidden');
                channelListDiv.classList.remove('active');
                if (hlsInstance) {
                    hlsInstance.destroy();
                    hlsInstance = null;
                }
                video.pause();
                statusDiv.textContent = '🔗 أدخل رابط M3U8 وشغّل';
            }
        }

        // ============ تشغيل رابط M3U8 مباشر ============
        function playM3U8Url() {
            const url = document.getElementById('m3u8Url').value.trim();
            if (!url) {
                statusDiv.textContent = '⚠️ الرجاء إدخال رابط M3U8 صالح';
                return;
            }

            statusDiv.textContent = '🔄 جاري تحميل الرابط...';
            
            if (hlsInstance) {
                hlsInstance.destroy();
                hlsInstance = null;
            }

            if (Hls.isSupported()) {
                hlsInstance = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                });
                
                hlsInstance.loadSource(url);
                hlsInstance.attachMedia(video);
                
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                    statusDiv.textContent = '✅ جاهز للتشغيل';
                    video.play().catch(e => {
                        statusDiv.textContent = '⚠️ اضغط زر التشغيل للمتابعة';
                    });
                });
                
                hlsInstance.on(Hls.Events.ERROR, (e, data) => {
                    if (data.fatal) {
                        statusDiv.textContent = '❌ فشل تشغيل الرابط';
                        console.error('HLS Error:', data);
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play();
                statusDiv.textContent = '✅ جاهز للتشغيل (Safari)';
            } else {
                statusDiv.textContent = '❌ متصفحك لا يدعم تشغيل M3U8';
            }
        }

        // ============ قراءة ملف M3U المحلي ============
        async function loadLocalM3U() {
            try {
                statusDiv.textContent = '🔄 جاري تحديث القائمة...';
                
                const timestamp = Date.now();
                const response = await fetch(`list.m3u?t=${timestamp}`, {
                    cache: 'no-store',
                    headers: {
                        'Cache-Control': 'no-cache, no-store, must-revalidate',
                        'Pragma': 'no-cache',
                        'Expires': '0'
                    }
                });
                
                if (!response.ok) {
                    throw new Error('ملف list.m3u غير موجود! تأكد من وجوده في نفس المجلد.');
                }
                
                const text = await response.text();
                
                lastLoadTime = new Date();
                fileTimestamp.textContent = `⏱ آخر تحديث: ${lastLoadTime.toLocaleTimeString()}`;
                
                parseM3U(text);
                
                statusDiv.textContent = `✅ تم تحديث القائمة (${channels.length} قناة)`;
                
            } catch (error) {
                statusDiv.textContent = '❌ ' + error.message;
                channelListDiv.innerHTML = `
                    <div style="text-align:center;color:#ff6b6b;padding:20px;">
                        ❌ ${error.message}<br>
                        <small style="color:#888;">ضع ملف list.m3u في نفس مجلد الصفحة</small>
                    </div>
                `;
                channelCounter.textContent = '0 قناة';
                searchCount.textContent = '0 قناة';
            }
        }

        // ============ تحليل ملف M3U ============
        function parseM3U(data) {
            const lines = data.split('\n');
            const newChannels = [];
            let currentChannel = { name: '', url: '' };

            for (let line of lines) {
                line = line.trim();
                
                if (line.startsWith('#EXTINF:')) {
                    const nameMatch = line.match(/,([^,]+)$/);
                    if (nameMatch) {
                        currentChannel.name = nameMatch[1].trim();
                    }
                } 
                else if (line && !line.startsWith('#')) {
                    currentChannel.url = line;
                    if (currentChannel.name && currentChannel.url) {
                        newChannels.push({ ...currentChannel });
                        currentChannel = { name: '', url: '' };
                    }
                }
            }

            channels = newChannels;

            if (channels.length === 0) {
                statusDiv.textContent = '⚠️ لم يتم العثور على قنوات في الملف';
                channelListDiv.innerHTML = `
                    <div style="text-align:center;color:#ffd200;padding:20px;">
                        ⚠️ لا توجد قنوات في ملف list.m3u
                    </div>
                `;
                channelCounter.textContent = '0 قناة';
                searchCount.textContent = '0 قناة';
                return;
            }

            channelCounter.textContent = `${channels.length} قناة`;
            
            // محاولة استرجاع آخر قناة
            const lastChannel = getLastChannel();
            let targetIndex = 0;
            
            if (lastChannel) {
                // البحث عن القناة المحفوظة بالاسم
                const foundIndex = channels.findIndex(ch => ch.name === lastChannel.name);
                if (foundIndex !== -1) {
                    targetIndex = foundIndex;
                    lastChannelDisplay.textContent = `💾 آخر قناة: ${lastChannel.name} ✅`;
                } else {
                    lastChannelDisplay.textContent = `💾 آخر قناة: ${lastChannel.name} (غير موجودة)`;
                }
            }
            
            // التأكد من أن المؤشر في النطاق الصحيح
            if (targetIndex >= channels.length) {
                targetIndex = 0;
            }
            
            currentIndex = targetIndex;
            filteredChannels = [...channels];
            displayChannels();
            
            // تشغيل القناة المحفوظة أو الأولى
            playChannel(currentIndex);
            
            // مسح البحث
            searchInput.value = '';
            searchQuery = '';
            searchCount.textContent = `${channels.length} قناة`;
        }

        // ============ عرض القنوات ============
        function displayChannels() {
            const listToShow = searchQuery ? filteredChannels : channels;
            
            if (listToShow.length === 0) {
                channelListDiv.innerHTML = `
                    <div class="no-results">
                        🔍 لا توجد نتائج للبحث "<strong>${searchQuery}</strong>"
                    </div>
                `;
                return;
            }

            channelListDiv.innerHTML = '';
            
            // تحديد القناة النشطة في القائمة المصفاة
            let activeIndex = -1;
            if (searchQuery) {
                // في وضع البحث، نحدد النشاط بناءً على القناة الحالية
                const currentChannel = channels[currentIndex];
                if (currentChannel) {
                    activeIndex = listToShow.findIndex(ch => ch.name === currentChannel.name);
                }
            } else {
                activeIndex = currentIndex;
            }
            
            listToShow.forEach((channel, index) => {
                const div = document.createElement('div');
                const isActive = (index === activeIndex);
                div.className = 'channel-item' + (isActive ? ' active' : '');
                
                // إظهار النص مع تمييز الكلمات المطابقة
                let displayName = channel.name;
                if (searchQuery) {
                    const regex = new RegExp(`(${searchQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
                    displayName = channel.name.replace(regex, '<span class="match">$1</span>');
                }
                
                div.innerHTML = `
                    <span class="channel-name">${displayName}</span>
                    <span class="channel-number">#${index + 1}</span>
                `;
                
                const actualIndex = searchQuery ? channels.indexOf(channel) : index;
                div.onclick = () => {
                    currentIndex = actualIndex;
                    playChannel(actualIndex);
                };
                channelListDiv.appendChild(div);
            });
            
            // تمرير إلى القناة النشطة
            const activeElement = channelListDiv.querySelector('.channel-item.active');
            if (activeElement) {
                activeElement.scrollIntoView({ block: 'center', behavior: 'smooth' });
            }
        }

        // ============ البحث في القنوات ============
        function searchChannels(query) {
            searchQuery = query.trim();
            
            if (!searchQuery) {
                filteredChannels = [...channels];
                searchCount.textContent = `${channels.length} قناة`;
                displayChannels();
                return;
            }

            // بحث بالحروف الأولى (بداية الكلمة) أو أي جزء
            const regex = new RegExp(searchQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'i');
            filteredChannels = channels.filter(ch => regex.test(ch.name));
            
            searchCount.textContent = `${filteredChannels.length} من ${channels.length}`;
            displayChannels();
            
            // تشغيل أول نتيجة إذا وجدت
            if (filteredChannels.length > 0 && searchQuery.length > 1) {
                const firstMatch = channels.indexOf(filteredChannels[0]);
                if (firstMatch !== -1) {
                    currentIndex = firstMatch;
                    playChannel(firstMatch);
                }
            }
        }

        function clearSearch() {
            searchInput.value = '';
            searchQuery = '';
            filteredChannels = [...channels];
            searchCount.textContent = `${channels.length} قناة`;
            displayChannels();
        }

        // ============ تشغيل قناة ============
        function playChannel(index) {
            if (index < 0 || index >= channels.length) return;
            
            const channel = channels[index];
            currentIndex = index;
            statusDiv.textContent = `▶️ تشغيل: ${channel.name}`;
            
            // حفظ آخر قناة
            saveLastChannel(channel.name, index);
            
            // تحديث القائمة المظللة
            document.querySelectorAll('.channel-item').forEach((el, i) => {
                el.classList.toggle('active', i === index);
            });

            const url = channel.url;
            
            if (hlsInstance) {
                hlsInstance.destroy();
                hlsInstance = null;
            }

            if (Hls.isSupported()) {
                hlsInstance = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                });
                
                hlsInstance.loadSource(url);
                hlsInstance.attachMedia(video);
                
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(e => {
                        statusDiv.textContent = `⚠️ ${channel.name}: اضغط زر التشغيل`;
                    });
                });
                
                hlsInstance.on(Hls.Events.ERROR, (e, data) => {
                    if (data.fatal) {
                        statusDiv.textContent = `❌ فشل تشغيل ${channel.name}`;
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play();
            } else {
                statusDiv.textContent = '❌ متصفحك لا يدعم تشغيل M3U';
            }
        }

        // ============ التنقل بين القنوات ============
        function playNext() {
            if (channels.length === 0) return;
            currentIndex = (currentIndex + 1) % channels.length;
            playChannel(currentIndex);
            // إلغاء البحث عند التنقل
            if (searchQuery) {
                clearSearch();
            }
        }

        function playPrevious() {
            if (channels.length === 0) return;
            currentIndex = (currentIndex - 1 + channels.length) % channels.length;
            playChannel(currentIndex);
            if (searchQuery) {
                clearSearch();
            }
        }

        // ============ التحميل التلقائي ============
        window.onload = function() {
            loadLocalM3U();
            
            // عرض آخر قناة محفوظة
            const last = getLastChannel();
            if (last) {
                lastChannelDisplay.textContent = `💾 آخر قناة: ${last.name}`;
            }
        };

        // ============ دعم Enter في البحث والرابط ============
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (filteredChannels.length > 0) {
                    const firstMatch = channels.indexOf(filteredChannels[0]);
                    if (firstMatch !== -1) {
                        currentIndex = firstMatch;
                        playChannel(firstMatch);
                    }
                }
            }
        });

        document.getElementById('m3u8Url').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                playM3U8Url();
            }
        });

        // ============ دعم键盘 ============
        document.addEventListener('keydown', (e) => {
            // Ctrl+F للبحث
            if (e.ctrlKey && e.key === 'f') {
                e.preventDefault();
                document.getElementById('searchInput').focus();
                document.getElementById('searchInput').select();
                return;
            }
            
            if (currentMode === 'file' && channels.length > 0) {
                // الأسهم للتنقل
                if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                    e.preventDefault();
                    playNext();
                } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                    e.preventDefault();
                    playPrevious();
                }
                // Esc لإلغاء البحث
                else if (e.key === 'Escape') {
                    clearSearch();
                    document.getElementById('searchInput').blur();
                }
            }
        });
    </script>
</body>
</html>
